<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CompareIQ</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="chat-panel" aria-label="Product search chat">
      <header class="topbar">
        <div>
          <p class="eyebrow">CompareIQ</p>
          <h1>Compare products</h1>
        </div>
        <div class="status-pill" id="statusPill">Ready</div>
      </header>

      <div id="chatLog" class="chat-log" aria-live="polite">
        <div class="message bot">
          <p>What are you shopping for?</p>
        </div>
      </div>

      <form id="chatForm" class="chat-form">
        <input
          id="chatInput"
          type="text"
          autocomplete="off"
          placeholder="Search phones, laptops, shoes..."
          maxlength="500"
          required
        >
        <button type="submit">Send</button>
      </form>
    </section>

    <section class="results-panel" aria-label="Ranked product results">
      <div class="results-header">
        <div>
          <p class="eyebrow">Recommendation</p>
          <h2 id="resultsTitle">No search yet</h2>
        </div>
        <button id="clearButton" type="button" class="secondary-button">Reset</button>
      </div>

      <div id="summaryCard" class="summary-card hidden"></div>
      <div id="resultsGrid" class="results-grid"></div>
    </section>
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
